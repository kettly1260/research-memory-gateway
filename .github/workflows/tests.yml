name: Tests

on:
  pull_request:
  push:
    branches: ["main", "agents-b-through-h-roadmap"]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: python -m pip install -e . pytest

      - name: Run pytest
        run: pytest
