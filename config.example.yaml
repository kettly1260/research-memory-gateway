server:
  name: research-memory-gateway
  host: 127.0.0.1
  port: 8787
  auth_token_env: RESEARCH_MEMORY_TOKEN

backend:
  # Default self-contained backend. This is enough for direct MCP calls.
  # Nocturne is not required; keep SQLite when you already have embedding/rerank services.
  type: sqlite
  sqlite_path: ./data/research_memory.db
  nocturne_url_env: NOCTURNE_URL
  nocturne_token_env: NOCTURNE_TOKEN

retrieval:
  # keyword: SQLite FTS only.
  # hybrid: SQLite FTS + optional external embedding model + optional rerank model.
  mode: keyword
  vector_candidate_limit: 50
  rerank_candidate_limit: 20
  embedding:
    enabled: false
    base_url_env: EMBEDDING_BASE_URL
    api_key_env: EMBEDDING_API_KEY
    model_env: EMBEDDING_MODEL
    endpoint_path: /embeddings
    timeout_seconds: 30
  rerank:
    enabled: false
    base_url_env: RERANK_BASE_URL
    api_key_env: RERANK_API_KEY
    model_env: RERANK_MODEL
    endpoint_path: /rerank
    timeout_seconds: 30

memory:
  require_user_confirmation: true
  require_evidence_for_claims: true
  max_summary_chars: 1800
  default_verification_status: unverified
  enable_light_graph: true
  overlap_limit: 5

sources:
  allowlist:
    - name: kilo
      type: kilo_session
      path: G:/LLM
      readonly: true
    - name: codex
      type: codex_session
      path: C:/Users/YING/.codex
      readonly: true
    - name: cherry
      type: cherry_export
      path: G:/LLM/cherry-exports
      readonly: true

export:
  markdown_dir: ./exports/markdown
  json_dir: ./exports/json
