services:
  research-memory-gateway:
    image: ghcr.io/kettly1260/research-memory-gateway:latest
    container_name: research-memory-gateway
    ports:
      - "8787:8787"
    environment:
      RESEARCH_MEMORY_TOKEN: "change-me"
      EMBEDDING_BASE_URL: ""
      EMBEDDING_API_KEY: ""
      EMBEDDING_MODEL: ""
      RERANK_BASE_URL: ""
      RERANK_API_KEY: ""
      RERANK_MODEL: ""
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./exports:/app/exports
    restart: unless-stopped
